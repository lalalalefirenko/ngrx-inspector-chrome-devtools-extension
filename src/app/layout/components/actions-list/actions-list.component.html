<div class="list">
  <cdk-virtual-scroll-viewport itemSize="30" class="actions-viewport">
    <div
      *cdkVirtualFor="let action of visibleActions(); trackBy: trackById"
      class="row"
      [class.active]="selectedAction()?.id === action.id"
      [class.new]="newIds().has(action.id)"
      (click)="actionClickHandler(action)"
    >
      {{ action.type }}
    </div>
  </cdk-virtual-scroll-viewport>
</div>
