<div class="layout">
  <aside>
    <input
      class="filter"
      placeholder="search... minimum 2 symbols required"
      [formControl]="searchControl"
    />
    <actions-list (actionClicked)="closeSettings()" />
  </aside>
  <main>
    <action-details [canDisplayDetails]="!isSettingsOpened()" />
    @if(isSettingsOpened()){
    <app-settings (close)="closeSettings()" />
    }

    <button class="floating-btn settings-btn" (click)="toggleSettings()">
      <settings-svg></settings-svg>
    </button>
    <button class="floating-btn clear-btn" (click)="clearActionsData()">
      <clear-all-svg></clear-all-svg>
    </button>
  </main>
</div>
